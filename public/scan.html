<!DOCTYPE html>
<html lang="sv" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brevklar — Skanna</title>
    <meta name="description" content="Skanna vilket brev eller dokument som helst och få det översatt och förklarat på ditt språk." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/scan.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563EB'/><path d='M5 11l11 8 11-8' stroke='white' stroke-width='2.2' stroke-linecap='round' fill='none'/><rect x='5' y='11' width='22' height='13' rx='2' stroke='white' stroke-width='2.2' fill='none'/></svg>"
    />
  </head>
  <body class="scan-body">
    <div class="scan-bg" aria-hidden="true">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <!-- TOP BAR -->
    <header class="scan-top">
      <a class="brand" href="/">
        <span class="brand-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="#2563EB" />
            <path d="M5 11l11 8 11-8" stroke="white" stroke-width="2.2" stroke-linecap="round" />
            <rect x="5" y="11" width="22" height="13" rx="2" stroke="white" stroke-width="2.2" />
          </svg>
        </span>
        <span class="brand-name">Brevklar</span>
      </a>
      <select id="lang-picker" class="lang-picker" aria-label="Language"></select>
    </header>

    <!-- STEP DOTS -->
    <div class="step-dots" id="step-dots" aria-hidden="true">
      <span class="step-dot active" data-step="lang"></span>
      <span class="step-dot" data-step="capture"></span>
      <span class="step-dot" data-step="action"></span>
      <span class="step-dot" data-step="result"></span>
    </div>

    <main class="scan-main">
      <!-- STEP 1: LANGUAGE -->
      <section class="scan-step active" id="step-lang">
        <div class="step-inner">
          <h1 data-i18n="scan_choose_lang">Välj ditt språk</h1>
          <p class="step-sub" data-i18n="scan_choose_lang_sub"></p>
          <div class="lang-grid" id="lang-grid"></div>
        </div>
      </section>

      <!-- STEP 2: CAPTURE -->
      <section class="scan-step" id="step-capture">
        <div class="capture-stage">
          <video id="camera" class="camera-feed" autoplay playsinline muted></video>
          <canvas id="capture-canvas" hidden></canvas>

          <div class="scan-frame" aria-hidden="true">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
            <div class="scan-laser"></div>
          </div>

          <p class="capture-hint" data-i18n="scan_point_doc"></p>

          <div class="capture-controls">
            <label class="icon-btn upload-btn" title="Upload">
              <input type="file" id="file-input" accept="image/*" hidden />
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg>
            </label>

            <button class="shutter-btn" id="shutter-btn" aria-label="Capture">
              <span class="shutter-ring"></span>
              <span class="shutter-core"></span>
            </button>

            <div class="icon-btn-spacer"></div>
          </div>

          <p class="capture-fallback" id="capture-fallback" hidden data-i18n="scan_no_camera"></p>
        </div>
      </section>

      <!-- STEP 3: ACTION -->
      <section class="scan-step" id="step-action">
        <div class="step-inner">
          <div class="preview-thumb">
            <img id="preview-img" alt="" />
            <button class="retake-link" id="retake-btn" data-i18n="scan_retake">← Ta om</button>
          </div>

          <h2 data-i18n="scan_what_todo">Vad vill du göra?</h2>

          <div class="action-grid">
            <button class="action-card" data-action="translate">
              <span class="action-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m5 8 6 6" /><path d="m4 14 6-6 2-3" /><path d="M2 5h12" /><path d="M7 2h1" /><path d="m22 22-5-10-5 10" /><path d="M14 18h6" /></svg>
              </span>
              <span class="action-text">
                <strong data-i18n="scan_translate_title">Översätt</strong>
                <small data-i18n="scan_translate_desc">Få texten på ditt språk</small>
              </span>
              <span class="action-arrow">→</span>
            </button>

            <button class="action-card" data-action="explain">
              <span class="action-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></svg>
              </span>
              <span class="action-text">
                <strong data-i18n="scan_explain_title">Förklara</strong>
                <small data-i18n="scan_explain_desc">Vad betyder det här?</small>
              </span>
              <span class="action-arrow">→</span>
            </button>

            <button class="action-card featured" data-action="analyze">
              <span class="action-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18" /><path d="m19 9-5 5-4-4-3 3" /></svg>
              </span>
              <span class="action-text">
                <strong data-i18n="scan_analyze_title">Fullständig analys</strong>
                <small data-i18n="scan_analyze_desc">Deadlines, åtgärder och risker</small>
              </span>
              <span class="action-arrow">→</span>
            </button>
          </div>
        </div>
      </section>

      <!-- STEP 4: RESULT -->
      <section class="scan-step" id="step-result">
        <div class="step-inner">
          <!-- Loading -->
          <div class="scan-loading" id="scan-loading">
            <div class="loading-doc">
              <div class="loading-laser"></div>
            </div>
            <p data-i18n="scan_processing">Analyserar...</p>
          </div>

          <!-- Output -->
          <div id="scan-output" class="scan-output" hidden></div>

          <div class="result-footer" id="result-footer" hidden>
            <button class="btn btn-outline btn-lg" id="scan-again-btn" data-i18n="scan_again">
              Skanna igen
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="/i18n.js"></script>
    <script src="/scan.js"></script>
  </body>
</html>
